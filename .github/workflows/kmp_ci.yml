name: KMP CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'kmp/**'
      - '.github/workflows/kmp_ci.yml'
      - '.github/actions/setup-gradle/**'
      - '!**/*.md'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'kmp/**'
      - '.github/workflows/kmp_ci.yml'
      - '.github/actions/setup-gradle/**'
      - '!**/*.md'

concurrency:
  group: kmp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GRADLE_OPTS: -Xmx3g
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Run Detekt
        run: ./gradlew detektMetadataCommonMain --no-daemon -Dorg.gradle.jvmargs="-Xmx3g -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
        working-directory: ./kmp

  ktlint:
    name: Ktlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GRADLE_OPTS: -Xmx3g
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Run Ktlint
        run: ./gradlew ktlintCheck --no-daemon -Dorg.gradle.jvmargs="-Xmx3g -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
        working-directory: ./kmp

  dependency-allowlist:
    name: Dependency Allowlist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GRADLE_OPTS: -Xmx3g
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Check dependency allowlist
        run: ./gradlew checkDependencyAllowlist --no-daemon -Dorg.gradle.jvmargs="-Xmx3g -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
        working-directory: ./kmp

  api-compatibility:
    name: Binary Compatibility (apiCheck)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('kmp/gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Verify public API has not drifted
        run: ./gradlew apiCheck --no-daemon -Dorg.gradle.jvmargs="-Xmx3g -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
        working-directory: ./kmp

      - name: Explain failure
        if: failure()
        run: |
          echo "::error::Public API of a published Lemonade module changed without an updated API baseline."
          echo "::error::Run './gradlew apiDump' from ./kmp, review the diff in api/*.api and api/*.klib.api files, and commit it."
          echo "::error::This guard blocks accidental breaking changes AND silently-added public surface."

  api-stability-review:
    # Classifies the PR's `.api` / `.klib.api` diff and — for ABI-breaking
    # changes — requires an APPROVED review from one of the named maintainers
    # tied to the latest commit. Pure additions auto-pass.
    name: API Stability Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    env:
      APPROVERS: caiqueslp williankl DevSrSouza
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Compute API diff against base
        id: diff
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          # No --depth: the PR head SHA is fetched separately by actions/checkout,
          # so we need enough of `$BASE`'s history to reach the merge base. A
          # shallow fetch of just the base tip fails with "no merge base".
          git fetch --no-tags origin "$BASE"
          git diff -U999999 "origin/$BASE...HEAD" -- \
            'kmp/*/api/*.klib.api' \
            'kmp/*/api/*/*.api' \
            > /tmp/api.diff
          echo "diff_bytes=$(wc -c </tmp/api.diff | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Classify diff
        run: ./gradlew classifyApiDiff -PapiDiffFile=/tmp/api.diff -PapiVerdictFile=/tmp/verdict.txt --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"
        working-directory: ./kmp

      - name: Read verdict
        id: verdict
        run: |
          VERDICT=$(head -n1 /tmp/verdict.txt | tr -d '\r\n')
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "Verdict: $VERDICT"
          if [ "$VERDICT" = "BREAKING" ]; then
            {
              echo "reasons<<EOF"
              tail -n +2 /tmp/verdict.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-pass (additions-only or no changes)
        if: steps.verdict.outputs.verdict != 'BREAKING'
        run: |
          echo "::notice::Verdict=${{ steps.verdict.outputs.verdict }} — no maintainer approval required."

      - name: Require maintainer approval (breaking change)
        if: steps.verdict.outputs.verdict == 'BREAKING'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "::warning::ABI-breaking change detected:"
          echo "${{ steps.verdict.outputs.reasons }}"
          echo

          APPROVALS=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --jq ".[] | select(.state == \"APPROVED\" and .commit_id == \"${HEAD_SHA}\") | .user.login" \
            | sort -u || true)

          echo "Approvals on commit ${HEAD_SHA}:"
          echo "${APPROVALS:-(none)}"
          echo

          MATCHED=""
          for handle in ${APPROVERS}; do
            if echo "${APPROVALS}" | grep -qx "${handle}"; then
              MATCHED="${handle}"
              break
            fi
          done

          if [ -n "${MATCHED}" ]; then
            echo "::notice::Breaking API change approved by @${MATCHED} on ${HEAD_SHA}."
            exit 0
          fi

          echo "::error::Breaking public API change requires an APPROVED review on commit ${HEAD_SHA} from one of: @caiqueslp, @williankl, @DevSrSouza."
          echo "::error::Re-request review after every new push — approvals are matched against the latest commit SHA."
          exit 1

  build:
    name: Build
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('kmp/gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Compile All Targets
        run: ./gradlew compileKotlinMetadata compileKotlinIosArm64 compileKotlinIosSimulatorArm64 compileKotlinDesktop --no-daemon
        working-directory: ./kmp

      - name: Setup Dependency Submission
        uses: gradle/actions/dependency-submission@v4.4.2
        with:
          build-root-directory: kmp

  android-screenshots:
    name: Android Screenshots
    # Linux runner: Roborazzi renders deterministically on Linux, so we don't
    # need teya's self-hosted macOS runners.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run on non-draft PRs and on pushes to the default branch.
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the PR HEAD branch (not the merge ref) and use the PAT so
          # the bot's golden-update push re-triggers CI (the default
          # GITHUB_TOKEN deliberately cannot, to avoid recursive runs).
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.SCREENSHOT_AUTOMATION_TOKEN }}

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Verify and record screenshots
        id: vandr
        continue-on-error: true
        # verifyAndRecord only overwrites goldens whose PIXELS actually changed,
        # so PNG byte-noise can't churn the tree. The verify assertion still
        # flips the step outcome to failure, which is what gates the commit step.
        run: ./gradlew :ui:verifyAndRecordRoborazziDebug --continue --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
        working-directory: ./kmp

      - name: Verify screenshots (distinguish diffs from crashes)
        id: verify
        if: steps.vandr.outcome == 'failure'
        continue-on-error: true
        # After vandr recorded changed goldens in place, plain verify now passes
        # for pixel-diff cases and only still-fails when a preview crashed.
        run: ./gradlew :ui:verifyRoborazziDebug --continue --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
        working-directory: ./kmp

      - name: Import GPG signing key
        id: import-gpg
        if: steps.vandr.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GPG_KEY_B64: ${{ secrets.SCREENSHOT_AUTOMATION_GPG_KEY }}
          GPG_EMAIL: ${{ secrets.SCREENSHOT_AUTOMATION_GPG_EMAIL }}
        run: |
          set -euo pipefail
          echo "$GPG_KEY_B64" | base64 --decode | gpg --batch --import
          # import-ownertrust and git's signingkey want the 40-char fingerprint
          # (fpr field), not the 16-char key id (sec field) — the latter is
          # rejected as "invalid fingerprint".
          FINGERPRINT=$(gpg --list-secret-keys --with-colons "$GPG_EMAIL" | awk -F: '$1 == "fpr" { print $10; exit }')
          printf '%s:6:\n' "$FINGERPRINT" | gpg --batch --import-ownertrust
          git config --global user.signingkey "$FINGERPRINT"
          git config --global user.name "Lemonade Screenshots Bot"
          git config --global user.email "$GPG_EMAIL"
          git config --global commit.gpgsign true

      - name: Commit updated screenshots
        if: steps.vandr.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          BRANCH: ${{ github.head_ref }}
        run: ./scripts/commit-screenshot-updates.sh

      - name: Upload screenshot diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshot-diffs
          path: |
            kmp/ui/build/outputs/roborazzi/**
            kmp/ui/src/androidMain/screenshots/**

      - name: Fail on screenshot failure
        if: steps.verify.outcome == 'failure' || (steps.vandr.outcome == 'failure' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository))
        run: |
          if [[ "${{ steps.verify.outcome }}" == "failure" ]]; then
            echo "::error::A screenshot test crashed (verify still failed after re-recording). This is not a pixel diff — inspect the 'android-screenshot-diffs' artifact and fix the preview."
          else
            echo "::error::Screenshot goldens are out of date and cannot be auto-committed here (fork PR or push to main)."
            echo "::error::Record them locally: run './gradlew :ui:recordRoborazziDebug' from ./kmp, then commit the changes under 'kmp/ui/src/androidMain/screenshots/'."
          fi
          exit 1
      # NOTE: No GPG-key cleanup step — GitHub-hosted ubuntu runners are
      # ephemeral and destroyed after the job, so the imported key never persists.

  ci-status:
    name: CI Status
    if: always()
    needs: [ detekt, ktlint, dependency-allowlist, api-compatibility, api-stability-review, build, android-screenshots ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check CI results
        run: |
          # `api-stability-review` is skipped on push events (PR-only); treat skipped as a pass.
          ASR="${{ needs['api-stability-review'].result }}"
          if [[ "$ASR" != "success" && "$ASR" != "skipped" ]]; then
            ASR_BAD=1
          else
            ASR_BAD=0
          fi

          # `android-screenshots` is skipped when path filters exclude it or the event doesn't match; treat skipped as a pass.
          SCR="${{ needs['android-screenshots'].result }}"
          if [[ "$SCR" != "success" && "$SCR" != "skipped" ]]; then
            SCR_BAD=1
          else
            SCR_BAD=0
          fi

          if [[ "${{ needs.detekt.result }}" != "success" || \
                "${{ needs.ktlint.result }}" != "success" || \
                "${{ needs['dependency-allowlist'].result }}" != "success" || \
                "${{ needs['api-compatibility'].result }}" != "success" || \
                "$ASR_BAD" == "1" || \
                "$SCR_BAD" == "1" || \
                "${{ needs.build.result }}" != "success" ]]; then
            echo "CI did not succeed: detekt=${{ needs.detekt.result }}, ktlint=${{ needs.ktlint.result }}, dependency-allowlist=${{ needs['dependency-allowlist'].result }}, api-compatibility=${{ needs['api-compatibility'].result }}, api-stability-review=$ASR, android-screenshots=$SCR, build=${{ needs.build.result }}"
            exit 1
          fi
          echo "All CI checks passed"
