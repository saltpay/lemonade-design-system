name: KMP CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'kmp/**'
      - '.github/workflows/kmp_ci.yml'
      - '.github/actions/setup-gradle/**'
      - '!**/*.md'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'kmp/**'
      - '.github/workflows/kmp_ci.yml'
      - '.github/actions/setup-gradle/**'
      - '!**/*.md'
  pull_request_review:
    # Re-evaluate api-stability-review when a maintainer adds/dismisses a
    # review, so the gate flips automatically without a manual re-run.
    types: [submitted, dismissed]

concurrency:
  # push / pull_request: group per ref so a new commit cancels stale runs.
  # pull_request_review: unique group per run so review-triggered runs never
  # cancel an in-progress full CI run for the same PR.
  group: ${{ github.event_name == 'pull_request_review' && format('kmp-ci-review-{0}', github.run_id) || format('kmp-ci-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request_review'
    env:
      GRADLE_OPTS: -Xmx3g
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Run Detekt
        run: ./gradlew detektMetadataCommonMain --no-daemon -Dorg.gradle.jvmargs="-Xmx3g -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
        working-directory: ./kmp

  ktlint:
    name: Ktlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request_review'
    env:
      GRADLE_OPTS: -Xmx3g
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Run Ktlint
        run: ./gradlew ktlintCheck --no-daemon -Dorg.gradle.jvmargs="-Xmx3g -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
        working-directory: ./kmp

  dependency-allowlist:
    name: Dependency Allowlist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request_review'
    env:
      GRADLE_OPTS: -Xmx3g
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Check dependency allowlist
        run: ./gradlew checkDependencyAllowlist --no-daemon -Dorg.gradle.jvmargs="-Xmx3g -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
        working-directory: ./kmp

  api-compatibility:
    name: Binary Compatibility (apiCheck)
    runs-on: macos-latest
    timeout-minutes: 30
    if: github.event_name != 'pull_request_review'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('kmp/gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Verify public API has not drifted
        run: ./gradlew apiCheck --no-daemon -Dorg.gradle.jvmargs="-Xmx3g -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
        working-directory: ./kmp

      - name: Explain failure
        if: failure()
        run: |
          echo "::error::Public API of a published Lemonade module changed without an updated API baseline."
          echo "::error::Run './gradlew apiDump' from ./kmp, review the diff in api/*.api and api/*.klib.api files, and commit it."
          echo "::error::This guard blocks accidental breaking changes AND silently-added public surface."

  api-stability-review:
    # Classifies the PR's `.api` / `.klib.api` diff and — for ABI-breaking
    # changes — requires an APPROVED review from one of the named maintainers
    # tied to the latest commit. Pure additions auto-pass.
    name: API Stability Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'
    permissions:
      contents: read
      pull-requests: read
      checks: write
    env:
      APPROVERS: caiqueslp williankl DevSrSouza
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Compute API diff against base
        id: diff
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          # No --depth: the PR head SHA is fetched separately by actions/checkout,
          # so we need enough of `$BASE`'s history to reach the merge base. A
          # shallow fetch of just the base tip fails with "no merge base".
          git fetch --no-tags origin "$BASE"
          git diff -U999999 "origin/$BASE...HEAD" -- \
            'kmp/*/api/*.klib.api' \
            'kmp/*/api/*/*.api' \
            > /tmp/api.diff
          echo "diff_bytes=$(wc -c </tmp/api.diff | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Classify diff
        run: ./gradlew classifyApiDiff -PapiDiffFile=/tmp/api.diff -PapiVerdictFile=/tmp/verdict.txt --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"
        working-directory: ./kmp

      - name: Read verdict
        id: verdict
        run: |
          VERDICT=$(head -n1 /tmp/verdict.txt | tr -d '\r\n')
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "Verdict: $VERDICT"
          if [ "$VERDICT" = "BREAKING" ]; then
            {
              echo "reasons<<EOF"
              tail -n +2 /tmp/verdict.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-pass (additions-only or no changes)
        if: steps.verdict.outputs.verdict != 'BREAKING'
        run: |
          echo "::notice::Verdict=${{ steps.verdict.outputs.verdict }} — no maintainer approval required."

      - name: Require maintainer approval (breaking change)
        if: steps.verdict.outputs.verdict == 'BREAKING'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Pass the reasons through the environment, never inline. Interpolating
          # ${{ ... }} straight into the script lets the API signatures in the text
          # (e.g. `Alignment$Vertical`, `foo$default`) be re-expanded by bash, and
          # under `set -u` an unbound `$Vertical` aborts the whole step before the
          # approval check runs. As an env var the value stays literal.
          REASONS: ${{ steps.verdict.outputs.reasons }}
        run: |
          set -euo pipefail
          echo "::warning::ABI-breaking change detected:"
          echo "$REASONS"
          echo

          APPROVALS=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --jq ".[] | select(.state == \"APPROVED\" and .commit_id == \"${HEAD_SHA}\") | .user.login" \
            | sort -u || true)

          echo "Approvals on commit ${HEAD_SHA}:"
          echo "${APPROVALS:-(none)}"
          echo

          MATCHED=""
          for handle in ${APPROVERS}; do
            if echo "${APPROVALS}" | grep -qx "${handle}"; then
              MATCHED="${handle}"
              break
            fi
          done

          if [ -n "${MATCHED}" ]; then
            echo "::notice::Breaking API change approved by @${MATCHED} on ${HEAD_SHA}."
            exit 0
          fi

          echo "::error::Breaking public API change requires an APPROVED review on commit ${HEAD_SHA} from one of: @caiqueslp, @williankl, @DevSrSouza."
          echo "::error::Re-request review after every new push — approvals are matched against the latest commit SHA."
          exit 1

      - name: Reconcile stale failed check on approval
        # On a pull_request_review re-run, the original commit-triggered run left a
        # FAILED "API Stability Review" check on this same head SHA. We only reach
        # this step when the verdict now passes (additive, or breaking-but-approved),
        # because the steps above exit non-zero otherwise and skip this one. Flip the
        # stale failed check to success so the merge gate reflects the current verdict.
        #
        # The newly-created check from this run is the authoritative one, so this is
        # belt-and-suspenders cleanup of the old one. It is allowed to fail soft: if
        # the API ever rejects the cross-run update, we fall back to GitHub picking
        # the latest check run of the same name.
        if: github.event_name == 'pull_request_review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          STALE=$(gh api "repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs?per_page=100" \
            --jq '.check_runs[] | select(.name == "API Stability Review" and .status == "completed" and .conclusion == "failure") | .id' || true)

          if [ -z "${STALE}" ]; then
            echo "No stale failed 'API Stability Review' check on ${HEAD_SHA} to reconcile."
            exit 0
          fi

          for id in ${STALE}; do
            echo "Flipping stale check run ${id} to success."
            if ! gh api -X PATCH "repos/${{ github.repository }}/check-runs/${id}" \
                -f status=completed \
                -f conclusion=success \
                -f 'output[title]=Superseded by approved review' \
                -f 'output[summary]=A later API Stability Review run on this commit passed (additive change, or breaking change approved by a maintainer). This stale failed check was reconciled so it no longer blocks merge.'; then
              echo "::warning::Could not update stale check run ${id}. Merge still relies on the latest passing check of the same name."
            fi
          done

  build:
    name: Build
    runs-on: macos-latest
    timeout-minutes: 45
    if: github.event_name != 'pull_request_review'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('kmp/gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Compile All Targets
        run: ./gradlew compileKotlinMetadata compileKotlinIosArm64 compileKotlinIosSimulatorArm64 compileKotlinDesktop --no-daemon
        working-directory: ./kmp

      - name: Setup Dependency Submission
        uses: gradle/actions/dependency-submission@v4.4.2
        with:
          build-root-directory: kmp

  ci-status:
    name: CI Status
    # Skip on pull_request_review re-runs: those only re-evaluate
    # api-stability-review (which reports its own check status) and skip every
    # other job, so aggregating would either falsely pass or falsely fail.
    # The CI Status check_run from the prior full-CI run stays valid.
    if: always() && github.event_name != 'pull_request_review'
    needs: [ detekt, ktlint, dependency-allowlist, api-compatibility, build ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.detekt.result }}" != "success" || \
                "${{ needs.ktlint.result }}" != "success" || \
                "${{ needs['dependency-allowlist'].result }}" != "success" || \
                "${{ needs['api-compatibility'].result }}" != "success" || \
                "${{ needs.build.result }}" != "success" ]]; then
            echo "CI did not succeed: detekt=${{ needs.detekt.result }}, ktlint=${{ needs.ktlint.result }}, dependency-allowlist=${{ needs['dependency-allowlist'].result }}, api-compatibility=${{ needs['api-compatibility'].result }}, build=${{ needs.build.result }}"
            exit 1
          fi
          echo "All CI checks passed"
